version: '3.8'
services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - 4000:4000
    volumes:
      - ./backend/dev.db:/app/dev.db
      - ./backend/.env:/app/.env
    environment:
      - NODE_ENV=production
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - 3000:3000
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:4000
    depends_on:
      - backend
